
services:
  agent-server-ck:
    build:
      context: ./
      dockerfile: ./containers/agent-server-ck/Dockerfile
      args:
        AGENT_SERVER_IMAGE: ${AGENT_SERVER_BASE_IMAGE:-ghcr.io/openhands/agent-server:1.22.1-python}
        CONTEXT_KING_VERSION: ${CONTEXT_KING_VERSION:-v1.8.3}
        DOTNET_SDK_CHANNELS: ${DOTNET_SDK_CHANNELS:-8.0 9.0 10.0}
    image: ${AGENT_SERVER_IMAGE_REPOSITORY:-openhands-agent-server-ck}:${AGENT_SERVER_IMAGE_TAG:-local}
    command: ["bash", "-lc", "ck --version"]

  openhands:
    depends_on:
      - agent-server-ck
    build:
      context: ./
      dockerfile: ./containers/app/Dockerfile
    image: openhands:latest
    container_name: openhands-app-${DATE:-}
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=${AGENT_SERVER_IMAGE_REPOSITORY:-openhands-agent-server-ck}
      - AGENT_SERVER_IMAGE_TAG=${AGENT_SERVER_IMAGE_TAG:-local}
      #- SANDBOX_USER_ID=${SANDBOX_USER_ID:-1234} # enable this only if you want a specific non-root sandbox user but you will have to manually adjust permissions of ~/.openhands for this user
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_BASE:-$PWD/workspace}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
      - ${WORKSPACE_BASE:-$PWD/workspace}:/opt/workspace_base
    pull_policy: build
    stdin_open: true
    tty: true
